<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteWeb · 登录 — 纸书质感</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ===== Design System: 纸书质感 ===== */
    :root {
      --bg-page: #F5F0EB;
      --bg-card: #FAF8F5;
      --text-primary: #3D2E24;
      --text-secondary: #8B7A6B;
      --text-muted: #B8A99A;
      --accent: #C67A4E;
      --accent-hover: #B06A40;
      --accent-light: #F0E6DC;
      --border-line: #E4D9CE;
      --border-input: #D4C5B2;
      --font-logo: 'EB Garamond', 'Noto Serif SC', serif;
      --font-body: 'Noto Serif SC', 'Inter', sans-serif;
      --font-ui: 'Inter', sans-serif;
      --radius-sm: 4px;
      --radius-md: 12px;
      --shadow-page: none;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 微纸纹背景 */
      background-image: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 1px,
          rgba(0,0,0,0.008) 1px,
          rgba(0,0,0,0.008) 2px
        );
      background-size: 100% 2px;
      overflow-x: hidden;
    }

    /* ===== Container ===== */
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }

    /* ===== Logo ===== */
    .logo {
      text-align: center;
      margin-bottom: 3rem;
    }
    .logo__icon {
      font-family: var(--font-logo);
      font-size: 2.5rem;
      font-weight: 600;
      font-style: italic;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .logo__icon span {
      font-style: normal;
      font-weight: 400;
      font-size: 2rem;
      color: var(--text-muted);
    }
    .logo__sub {
      font-family: var(--font-ui);
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--text-muted);
      margin-top: 0.5rem;
      letter-spacing: 0.15em;
    }

    /* ===== Form ===== */
    .form-group {
      margin-bottom: 1.75rem;
    }
    .form-group label {
      display: block;
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .form-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border-input);
      background: transparent;
      padding: 0.6rem 0 0.4rem;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input::placeholder {
      color: var(--text-muted);
      font-weight: 300;
      font-size: 0.9rem;
    }
    .form-input:focus {
      border-bottom-color: var(--accent);
    }

    /* ===== Submit ===== */
    .btn-submit {
      display: block;
      width: 100%;
      padding: 0.8rem 0;
      margin-top: 2.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-submit:hover {
      background: var(--accent-hover);
    }
    .btn-submit:active {
      transform: scale(0.98);
    }

    /* ===== Links ===== */
    .form-footer {
      text-align: center;
      margin-top: 1.8rem;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .form-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-left: 0.3rem;
    }
    .form-footer a:hover {
      text-decoration: underline;
    }

    /* ===== Divider ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0 1.5rem;
      color: var(--border-line);
      font-family: var(--font-ui);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-line);
    }

    /* ===== Social ===== */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
    .social-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border-line);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text-secondary);
    }
    .social-btn:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .social-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ===== Footer ===== */
    .page-footer {
      text-align: center;
      margin-top: 3rem;
      font-family: var(--font-ui);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* ===== Register extra fields ===== */
    .register-only {
      display: none;
    }
    body.show-register .register-only {
      display: block;
    }

    /* ===== Toggle mode ===== */
    .mode-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.3rem;
      padding: 0.3rem;
      background: var(--bg-card);
      border: 1px solid var(--border-line);
      border-radius: 8px;
    }
    .mode-btn {
      padding: 0.35rem 0.7rem;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 0.7rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .mode-btn:not(.active):hover {
      color: var(--text-secondary);
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .login-container { max-width: 380px; padding: 1.5rem; }
      .logo { margin-bottom: 2.5rem; }
      .logo__icon { font-size: 2.2rem; }
      .social-row { gap: 0.75rem; }
    }
    @media (max-width: 480px) {
      body { align-items: flex-start; padding-top: 3rem; }
      .login-container { max-width: 100%; padding: 1.2rem; }
      .logo { margin-bottom: 2rem; }
      .logo__icon { font-size: 1.8rem; }
      .logo__sub { font-size: 0.7rem; }
      .mode-toggle { top: 0.6rem; right: 0.6rem; padding: 0.2rem; }
      .mode-btn { font-size: 0.65rem; padding: 0.25rem 0.5rem; }
      .form-group { margin-bottom: 1.25rem; }
      .form-input { font-size: 0.9rem; padding: 0.5rem 0; }
      .btn-submit { padding: 0.7rem 0; font-size: 0.9rem; }
      .form-footer { font-size: 0.8rem; }
      .social-btn { width: 40px; height: 40px; }
      .page-footer { font-size: 0.6rem; margin-top: 2rem; }
    }
    @media (max-width: 360px) {
      .login-container { padding: 1rem; }
      .logo__icon { font-size: 1.5rem; }
      .social-row { gap: 0.5rem; }
      .social-btn { width: 36px; height: 36px; }
      .social-btn svg { width: 16px; height: 16px; }
    }
  </style>
</head>
<body>
  <!-- 模式切换 -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="login">登录</button>
    <button class="mode-btn" data-mode="register">注册</button>
  </div>

  <!-- 主容器 -->
  <div class="login-container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo__icon">N<span>ote</span>Web</div>
      <div class="logo__sub">知 识 型 阅 读 工 作 台</div>
    </div>

    <!-- 登录表单 -->
    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label for="email">邮箱 / 用户名</label>
        <input type="text" id="email" class="form-input" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" class="form-input" placeholder="········" autocomplete="current-password" />
      </div>

      <!-- 注册额外字段 -->
      <div class="form-group register-only">
        <label for="username">用户名</label>
        <input type="text" id="username" class="form-input" placeholder="给自己取个名字" autocomplete="username" />
      </div>
      <div class="form-group register-only">
        <label for="confirm-password">确认密码</label>
        <input type="password" id="confirm-password" class="form-input" placeholder="再输一次" autocomplete="new-password" />
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">登 录</button>
    </form>

    <div class="form-footer">
      <span id="toggleText">没有账号？</span>
      <a href="#" id="toggleLink">去注册 →</a>
    </div>

    <!-- 社交登录预留 -->
    <div class="divider">或</div>
    <div class="social-row">
      <button class="social-btn" title="微信登录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 14.5c.6-.4 1-.9 1.2-1.5a4 4 0 0 0-1.7-5.2 4 4 0 0 0-5.4 1.5"/>
          <path d="M7 14.5c-.6-.4-1-.9-1.2-1.5a4 4 0 0 1 1.7-5.2 4 4 0 0 1 5.4 1.5"/>
          <path d="M12 20.5c2.5 0 4.7-1 6-2.5a4.5 4.5 0 0 0-4.5-5.5c-2.7 0-5 2-5 4.5 0 .7.2 1.4.5 2"/>
          <path d="M9.5 13a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1Z"/>
          <path d="M14.5 13a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1Z"/>
        </svg>
      </button>
      <button class="social-btn" title="Apple 登录">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C4.79 17.2 4.43 12.2 6.98 9.68c1.08-1.1 2.49-1.7 3.91-1.73 1.22.03 2.37.46 3.22 1.2.96-.49 2.01-.74 3.09-.71 1.84.04 3.24.72 4.25 2.04-1.66 1.02-2.49 2.45-2.75 4.26-.27 2.01.82 3.74 2.5 4.54-.47 1.23-1.07 2.44-1.95 3.5l-.2-.02zM12.03 7.25c-.14-2.02 1.65-3.75 3.63-3.88.28 2.22-1.66 4.01-3.63 3.88z"/>
        </svg>
      </button>
      <button class="social-btn" title="Google 登录">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
    </div>

    <div class="page-footer">© 2025 NoteWeb · 知识型阅读工作台</div>
  </div>

  <script>
    // 登录/注册切换
    const modeBtns = document.querySelectorAll('.mode-btn');
    const submitBtn = document.getElementById('submitBtn');
    const toggleLink = document.getElementById('toggleLink');
    const toggleText = document.getElementById('toggleText');
    let isLogin = true;

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (btn.dataset.mode === 'register') {
          document.body.classList.add('show-register');
          submitBtn.textContent = '注 册';
          toggleText.textContent = '已有账号？';
          toggleLink.textContent = '去登录 →';
          isLogin = false;
        } else {
          document.body.classList.remove('show-register');
          submitBtn.textContent = '登 录';
          toggleText.textContent = '没有账号？';
          toggleLink.textContent = '去注册 →';
          isLogin = true;
        }
      });
    });

    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      const targetMode = isLogin ? 'register' : 'login';
      document.querySelector(`[data-mode="${targetMode}"]`).click();
    });
  </script>
</body>
</html>
