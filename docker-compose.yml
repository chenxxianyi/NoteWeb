version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: noteweb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: noteweb
      MYSQL_USER: noteweb
      MYSQL_PASSWORD: noteweb123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: noteweb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: noteweb-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: noteweb
      MINIO_ROOT_PASSWORD: noteweb123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noteweb-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - minio
    environment:
      - ENV=production
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  mysql_data:
  minio_data:
