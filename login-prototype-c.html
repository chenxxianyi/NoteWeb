<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteWeb · 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- 衬线字体（纸书质感） -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== 双主题 Variables ===== */
    :root {
      /* 默认：纸书质感 */
      --bg-page: #F5F0EB;
      --bg-card: #FAF8F5;
      --bg-card-solid: #FFFFFF;
      --text-primary: #3D2E24;
      --text-secondary: #8B7A6B;
      --text-muted: #B8A99A;
      --text-on-accent: #FFFFFF;
      --accent: #C67A4E;
      --accent-hover: #B06A40;
      --accent-light: #F0E6DC;
      --accent-ghost: rgba(198,122,78,0.12);
      --border-color: #E4D9CE;
      --border-input: #D4C5B2;
      --shadow-sm: 0 1px 3px rgba(61,46,36,0.06);
      --shadow-md: 0 4px 12px rgba(61,46,36,0.08);
      --shadow-lg: 0 8px 30px rgba(61,46,36,0.1);
      --font-display: 'EB Garamond', 'Noto Serif SC', serif;
      --font-body: 'Noto Serif SC', 'Inter', serif;
      --font-ui: 'Inter', 'Noto Sans SC', sans-serif;
      --radius-sm: 4px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --bg-decoration: #EDE6DC;
    }

    /* 数字清爽主题 */
    body.theme-digital {
      --bg-page: #FAFAFA;
      --bg-card: #FFFFFF;
      --bg-card-solid: #FFFFFF;
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --text-on-accent: #FFFFFF;
      --accent: #2563EB;
      --accent-hover: #1D4ED8;
      --accent-light: #EFF6FF;
      --accent-ghost: rgba(37,99,235,0.1);
      --border-color: #E2E8F0;
      --border-input: #CBD5E1;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
      --font-display: 'Inter', 'Noto Sans SC', sans-serif;
      --font-body: 'Inter', 'Noto Sans SC', sans-serif;
      --font-ui: 'Inter', 'Noto Sans SC', sans-serif;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --bg-decoration: #F1F5F9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s, color 0.4s;
      position: relative;
    }

    /* ===== 装饰背景 ===== */
    .bg-decoration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .bg-decoration .circle {
      position: absolute;
      border-radius: 50%;
      transition: all 0.6s;
    }
    .bg-decoration .circle-1 {
      width: 400px; height: 400px;
      top: -100px; right: -100px;
      background: radial-gradient(circle, var(--accent-ghost) 0%, transparent 70%);
    }
    .bg-decoration .circle-2 {
      width: 300px; height: 300px;
      bottom: -80px; left: -80px;
      background: radial-gradient(circle, var(--accent-ghost) 0%, transparent 70%);
    }
    .bg-decoration .circle-3 {
      width: 80px; height: 80px;
      top: 30%; left: 8%;
      border: 1px solid var(--border-color);
      opacity: 0.3;
    }

    /* ===== Theme Toggle ===== */
    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem 0.4rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      font-family: var(--font-ui);
      font-size: 0.75rem;
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all 0.3s;
    }
    .theme-toggle:hover {
      box-shadow: var(--shadow-md);
    }
    .theme-toggle__thumb {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .theme-toggle__thumb svg {
      width: 14px; height: 14px;
      color: #fff;
      transition: transform 0.3s;
    }
    body.theme-digital .theme-toggle__thumb svg {
      transform: rotate(90deg);
    }

    /* ===== Container ===== */
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem 2rem;
      box-shadow: var(--shadow-lg);
      transition: all 0.4s;
    }

    /* ===== Logo ===== */
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo__icon {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      transition: color 0.3s;
    }
    .logo__sub {
      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 0.3rem;
      letter-spacing: 0.12em;
    }

    /* ===== Tab ==== */
    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      background: var(--bg-page);
      border-radius: var(--radius-md);
      padding: 0.2rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.5rem 0;
      border: none;
      background: transparent;
      border-radius: calc(var(--radius-md) - 2px);
      font-family: var(--font-ui);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* ===== Form ===== */
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-family: var(--font-ui);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.3rem;
      transition: color 0.3s;
    }
    .form-input {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      background: var(--bg-card-solid);
      font-family: var(--font-ui);
      font-size: 0.9rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
    }
    .form-input::placeholder {
      color: var(--text-muted);
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-ghost);
    }

    .register-only {
      display: none;
    }
    body.show-register .register-only {
      display: block;
    }

    /* ===== Submit ===== */
    .btn-submit {
      display: block;
      width: 100%;
      padding: 0.75rem 0;
      margin-top: 0.5rem;
      background: var(--accent);
      color: var(--text-on-accent);
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, border-radius 0.3s;
    }
    .btn-submit:hover {
      background: var(--accent-hover);
    }
    .btn-submit:active {
      transform: scale(0.98);
    }

    /* ===== Footer ===== */
    .form-footer {
      text-align: center;
      margin-top: 1.2rem;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .form-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .form-footer a:hover {
      text-decoration: underline;
    }

    /* ===== Divider ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0 1rem;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: 0.75rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
      transition: background 0.3s;
    }

    /* ===== Social ===== */
    .social-row {
      display: flex;
      gap: 0.75rem;
    }
    .social-btn {
      flex: 1;
      height: 44px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-ui);
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .social-btn:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .social-btn svg {
      width: 18px; height: 18px;
    }

    /* ===== Theme badge ===== */
    .theme-badge {
      text-align: center;
      margin-top: 1.2rem;
      font-family: var(--font-ui);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      opacity: 0.6;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .login-card { padding: 1.5rem 1.25rem; }
      .theme-toggle { top: 0.8rem; right: 0.8rem; padding: 0.3rem 0.3rem 0.3rem 0.8rem; }
      .theme-toggle span { display: none; }
      .social-btn { font-size: 0; }
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div class="bg-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <!-- 主题切换开关 -->
  <button class="theme-toggle" id="themeToggle">
    <span id="themeLabel">切换为数字清爽</span>
    <div class="theme-toggle__thumb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
      </svg>
    </div>
  </button>

  <!-- 主容器 -->
  <div class="login-wrap">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo">
        <div class="logo__icon">NoteWeb</div>
        <div class="logo__sub">知 识 型 阅 读 工 作 台</div>
      </div>

      <!-- Tab 切换 -->
      <div class="tab-row">
        <button class="tab-btn active" data-tab="login">登录</button>
        <button class="tab-btn" data-tab="register">注册</button>
      </div>

      <!-- 表单 -->
      <form onsubmit="return false;">
        <div class="form-group register-only">
          <label for="username">用户名</label>
          <input type="text" id="uc" class="form-input" placeholder="给自己取个名字" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="email">邮箱 / 用户名</label>
          <input type="text" id="email" class="form-input" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" class="form-input" placeholder="········" autocomplete="current-password" />
        </div>
        <div class="form-group register-only">
          <label for="confirm">确认密码</label>
          <input type="password" id="confirm" class="form-input" placeholder="再输一次" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">登 录</button>
      </form>

      <div class="form-footer">
        <span id="toggleText">没有账号？</span>
        <a href="#" id="toggleLink">去注册 →</a>
      </div>

      <div class="divider">或</div>

      <div class="social-row">
        <button class="social-btn" title="微信登录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 14.5c.6-.4 1-.9 1.2-1.5a4 4 0 0 0-1.7-5.2 4 4 0 0 0-5.4 1.5"/>
            <path d="M7 14.5c-.6-.4-1-.9-1.2-1.5a4 4 0 0 1 1.7-5.2 4 4 0 0 1 5.4 1.5"/>
            <path d="M12 20.5c2.5 0 4.7-1 6-2.5a4.5 4.5 0 0 0-4.5-5.5c-2.7 0-5 2-5 4.5 0 .7.2 1.4.5 2"/>
          </svg>
          微信
        </button>
        <button class="social-btn" title="Apple 登录">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C4.79 17.2 4.43 12.2 6.98 9.68c1.08-1.1 2.49-1.7 3.91-1.73 1.22.03 2.37.46 3.22 1.2.96-.49 2.01-.74 3.09-.71 1.84.04 3.24.72 4.25 2.04-1.66 1.02-2.49 2.45-2.75 4.26-.27 2.01.82 3.74 2.5 4.54-.47 1.23-1.07 2.44-1.95 3.5l-.2-.02z"/>
          </svg>
          Apple
        </button>
        <button class="social-btn" title="Google 登录">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          </svg>
          Google
        </button>
      </div>

      <div class="theme-badge" id="themeBadge">✦ 当前：纸书质感 ✦</div>
    </div>
  </div>

  <script>
    // === 主题切换 ===
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const themeBadge = document.getElementById('themeBadge');
    let isPaperMode = true;

    themeToggle.addEventListener('click', () => {
      isPaperMode = !isPaperMode;
      document.body.classList.toggle('theme-digital', !isPaperMode);
      themeLabel.textContent = isPaperMode ? '切换为数字清爽' : '切换为纸书质感';
      themeBadge.textContent = isPaperMode ? '✦ 当前：纸书质感 ✦' : '✦ 当前：数字清爽 ✦';
    });

    // === 登录/注册切换 ===
    const tabBtns = document.querySelectorAll('.tab-btn');
    const submitBtn = document.getElementById('submitBtn');
    const toggleLink = document.getElementById('toggleLink');
    const toggleText = document.getElementById('toggleText');
    let isLogin = true;

    function setMode(login) {
      isLogin = login;
      document.body.classList.toggle('show-register', !login);
      submitBtn.textContent = login ? '登 录' : '注 册';
      toggleText.textContent = login ? '没有账号？' : '已有账号？';
      toggleLink.textContent = login ? '去注册 →' : '去登录 →';
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        setMode(btn.dataset.tab === 'login');
      });
    });

    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      const target = isLogin ? 'register' : 'login';
      document.querySelector(`[data-tab="${target}"]`).click();
    });
  </script>
</body>
</html>
