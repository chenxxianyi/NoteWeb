<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteWeb · 设置</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-page: #F5F0EB; --bg-card: #FAF8F5; --bg-sidebar: #F0EAE3;
      --text-primary: #3D2E24; --text-secondary: #8B7A6B; --text-muted: #B8A99A;
      --accent: #C67A4E; --accent-hover: #B06A40; --accent-light: #F0E6DC;
      --border-color: #E4D9CE;
      --font-display: 'EB Garamond', 'Noto Serif SC', serif;
      --font-body: 'Noto Serif SC', 'Inter', serif;
      --font-ui: 'Inter', 'Noto Sans SC', sans-serif;
      --radius: 8px; --radius-lg: 12px;
      --sidebar-w: 220px;
    }
    body.theme-digital {
      --bg-page: #FAFAFA; --bg-card: #FFFFFF; --bg-sidebar: #FFFFFF;
      --text-primary: #1E293B; --text-secondary: #64748B; --text-muted: #94A3B8;
      --accent: #2563EB; --accent-hover: #1D4ED8; --accent-light: #EFF6FF;
      --border-color: #E2E8F0;
      --font-display: 'Inter', 'Noto Sans SC', sans-serif;
      --font-body: 'Inter', 'Noto Sans SC', sans-serif;
      --font-ui: 'Inter', 'Noto Sans SC', sans-serif;
      --radius: 6px; --radius-lg: 10px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font-body); background:var(--bg-page); color:var(--text-primary); min-height:100vh; display:flex; overflow-x:hidden; transition:background 0.4s,color 0.4s; }

    .sidebar { width:var(--sidebar-w); background:var(--bg-sidebar); border-right:1px solid var(--border-color); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:10; transition:all 0.3s; }
    .sidebar__brand { padding:1.25rem; border-bottom:1px solid var(--border-color); }
    .sidebar__brand h1 { font-family:var(--font-display); font-size:1.2rem; font-weight:600; color:var(--accent); }
    .sidebar__brand span { font-family:var(--font-ui); font-size:0.65rem; color:var(--text-muted); }
    .sidebar__nav { flex:1; padding:0.75rem; display:flex; flex-direction:column; gap:0.15rem; }
    .sidebar__item { display:flex; align-items:center; gap:0.75rem; padding:0.6rem 0.75rem; border-radius:var(--radius); color:var(--text-secondary); text-decoration:none; font-family:var(--font-ui); font-size:0.85rem; font-weight:500; transition:all 0.15s; }
    .sidebar__item:hover { background:var(--accent-light); color:var(--text-primary); }
    .sidebar__item.active { background:var(--accent-light); color:var(--accent); font-weight:600; }
    .sidebar__item i { width:18px; height:18px; flex-shrink:0; }
    .sidebar__user { padding:0.75rem; border-top:1px solid var(--border-color); display:flex; align-items:center; gap:0.6rem; }
    .sidebar__user-av { width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-ui); font-size:0.75rem; font-weight:600; flex-shrink:0; }
    .sidebar-toggle { display:none; position:fixed; top:0.8rem; left:0.8rem; z-index:30; width:36px; height:36px; border:1px solid var(--border-color); border-radius:var(--radius); background:var(--bg-card); align-items:center; justify-content:center; cursor:pointer; color:var(--text-secondary); }

    .main { margin-left:var(--sidebar-w); flex:1; padding:1.5rem 2rem; max-width:860px; min-width:0; transition:margin-left 0.3s; }
    .page-title { font-family:var(--font-display); font-size:1.4rem; font-weight:600; margin-bottom:1.5rem; transition:font-family 0.3s; }

    .section { margin-bottom:1.5rem; }
    .section__title { font-family:var(--font-ui); font-size:0.7rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.6rem; }

    .card { background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-lg); overflow:hidden; transition:all 0.4s; }
    .row { display:flex; align-items:center; padding:0.75rem 1.2rem; border-bottom:1px solid var(--border-color); gap:0.75rem; }
    .row:last-child { border-bottom:none; }
    .row__icon { width:34px; height:34px; border-radius:8px; background:var(--accent-light); display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0; }
    .row__icon i { width:17px; height:17px; }
    .row__body { flex:1; min-width:0; }
    .row__label { font-size:0.85rem; font-weight:500; }
    .row__desc { font-family:var(--font-ui); font-size:0.7rem; color:var(--text-muted); margin-top:0.1rem; }
    .row__right { flex-shrink:0; display:flex; align-items:center; gap:0.5rem; }

    .input { padding:0.4rem 0.7rem; border:1px solid var(--border-color); border-radius:var(--radius); background:var(--bg-page); font-family:var(--font-ui); font-size:0.82rem; color:var(--text-primary); outline:none; width:180px; }
    .input:focus { border-color:var(--accent); }
    .input--w { width:240px; }

    .btn { height:32px; padding:0 0.8rem; border:1px solid var(--border-color); border-radius:var(--radius); background:var(--bg-card); font-family:var(--font-ui); font-size:0.78rem; color:var(--text-secondary); cursor:pointer; display:inline-flex; align-items:center; gap:0.3rem; transition:all 0.12s; }
    .btn:hover { border-color:var(--accent); color:var(--accent); }
    .btn--primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn--primary:hover { background:var(--accent-hover); }
    .btn--danger { border-color:#FECACA; color:#DC2626; }
    .btn--danger:hover { background:#FEF2F2; }

    .toggle { position:relative; width:38px; height:20px; background:var(--border-color); border-radius:10px; cursor:pointer; transition:background 0.2s; flex-shrink:0; }
    .toggle.active { background:var(--accent); }
    .toggle::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform 0.2s; }
    .toggle.active::after { transform:translateX(18px); }

    .progress { display:flex; align-items:center; gap:0.5rem; }
    .progress__bar { width:140px; height:6px; background:var(--border-color); border-radius:3px; overflow:hidden; }
    .progress__fill { height:100%; background:var(--accent); border-radius:3px; }
    .progress__text { font-size:0.7rem; color:var(--text-muted); white-space:nowrap; }

    .theme-btn { position:fixed; top:0.6rem; right:0.6rem; z-index:40; width:34px; height:34px; border:1px solid var(--border-color); border-radius:50%; background:var(--bg-card); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted); transition:all 0.3s; }
    .theme-btn:hover { border-color:var(--accent); color:var(--accent); }
    .theme-btn i { width:16px; height:16px; }

    .color-row { display:flex; gap:0.3rem; }
    .color-dot { width:28px; height:28px; border-radius:50%; border:2px solid transparent; cursor:pointer; }
    .color-dot.active { border-color:var(--accent); }
    .select { padding:0.4rem 0.7rem; border:1px solid var(--border-color); border-radius:var(--radius); background:var(--bg-card); font-family:var(--font-ui); font-size:0.82rem; color:var(--text-primary); outline:none; cursor:pointer; }

    @media (max-width: 640px) {
      .main { padding:1rem; }
      .row { flex-wrap:wrap; }
      .row__right { width:100%; }
      .input,.input--w { width:100%; }
    }
    @media (max-width: 520px) {
      :root { --sidebar-w:0px; }
      .sidebar { display:none; }
      .sidebar-toggle { display:flex; }
      .main { margin-left:0; }
    }
  </style>
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle"><i data-lucide="menu"></i></button>
  <button class="theme-btn" id="themeToggle"><i data-lucide="moon"></i></button>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar__brand"><h1>NoteWeb</h1><span>知识型阅读工作台</span></div>
    <div class="sidebar__nav">
      <a href="#" class="sidebar__item"><i data-lucide="layout-dashboard"></i> 仪表盘</a>
      <a href="#" class="sidebar__item"><i data-lucide="file-text"></i> 文件库</a>
      <a href="#" class="sidebar__item"><i data-lucide="book-open"></i> 阅读器</a>
      <a href="#" class="sidebar__item"><i data-lucide="pen-square"></i> 笔记</a>
      <a href="#" class="sidebar__item active"><i data-lucide="settings"></i> 设置</a>
    </div>
    <div class="sidebar__user"><div class="sidebar__user-av">M</div><div><div style="font-size:0.8rem;">小明</div><div style="font-size:0.65rem;color:var(--text-muted);">xiaoming@email.com</div></div></div>
  </nav>

  <div class="main">
    <h1 class="page-title">设置</h1>

    <div class="section">
      <div class="section__title">用户资料</div>
      <div class="card">
        <div class="row"><div class="row__icon"><i data-lucide="user"></i></div><div class="row__body"><div class="row__label">头像</div><div class="row__desc">支持 JPG / PNG</div></div><div class="row__right"><div style="width:40px;height:40px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);cursor:pointer;"><i data-lucide="camera" style="width:18px;height:18px;"></i></div></div></div>
        <div class="row"><div class="row__icon"><i data-lucide="user"></i></div><div class="row__body"><div class="row__label">用户名</div></div><div class="row__right"><input class="input" value="小明" /></div></div>
        <div class="row"><div class="row__icon"><i data-lucide="mail"></i></div><div class="row__body"><div class="row__label">邮箱</div></div><div class="row__right"><input class="input input--w" value="xiaoming@email.com" /></div></div>
        <div class="row"><div class="row__icon"><i data-lucide="lock"></i></div><div class="row__body"><div class="row__label">密码</div><div class="row__desc">最后修改于 2025-01-15</div></div><div class="row__right"><button class="btn">修改</button></div></div>
      </div>
    </div>

    <div class="section">
      <div class="section__title">外观</div>
      <div class="card">
        <div class="row"><div class="row__icon"><i data-lucide="palette"></i></div><div class="row__body"><div class="row__label">主题色</div></div><div class="row__right"><div class="color-row"><div class="color-dot active" style="background:#C67A4E;"></div><div class="color-dot" style="background:#2563EB;"></div><div class="color-dot" style="background:#1E293B;"></div></div></div></div>
        <div class="row"><div class="row__icon"><i data-lucide="font"></i></div><div class="row__body"><div class="row__label">字体</div></div><div class="row__right"><select class="select"><option>Noto Serif SC (推荐)</option><option>Inter</option><option>思源宋体</option></select></div></div>
        <div class="row"><div class="row__icon"><i data-lucide="sun"></i></div><div class="row__body"><div class="row__label">纸质阅读模式</div><div class="row__desc">模拟纸书质感的阅读体验</div></div><div class="row__right"><div class="toggle active"></div></div></div>
      </div>
    </div>

    <div class="section">
      <div class="section__title">存储</div>
      <div class="card">
        <div class="row"><div class="row__icon"><i data-lucide="hard-drive"></i></div><div class="row__body"><div class="row__label">已用空间</div><div class="row__desc">52.8 MB / 1 GB</div></div><div class="row__right"><div class="progress"><div class="progress__bar"><div class="progress__fill" style="width:5.2%"></div></div><span class="progress__text">5.2%</span></div></div></div>
        <div class="row"><div class="row__icon"><i data-lucide="file-text"></i></div><div class="row__body"><div class="row__label">数据概览</div><div class="row__desc">12 文档 · 8 笔记 · 47 批注</div></div><div class="row__right"><button class="btn"><i data-lucide="download" style="width:14px;height:14px;"></i> 导出</button></div></div>
      </div>
    </div>

    <div class="section">
      <div class="section__title">AI 配置</div>
      <div class="card">
        <div class="row"><div class="row__icon"><i data-lucide="cpu"></i></div><div class="row__body"><div class="row__label">AI 提供商</div></div><div class="row__right"><select class="select" style="cursor:pointer;"><option>Mock API</option><option>OpenAI</option><option>DeepSeek</option></select></div></div>
        <div class="row"><div class="row__icon"><i data-lucide="key"></i></div><div class="row__body"><div class="row__label">API Key</div><div class="row__desc">留空则使用 Mock 服务</div></div><div class="row__right"><input class="input input--w" type="password" value="sk-xxxxxxxxxxxxxxxx" /></div></div>
      </div>
    </div>

    <div class="section">
      <div class="section__title" style="color:#DC2626;">危险操作</div>
      <div class="card" style="border-color:#FECACA;">
        <div class="row"><div class="row__icon" style="background:#FEE2E2;color:#DC2626;"><i data-lucide="trash-2"></i></div><div class="row__body"><div class="row__label" style="color:#DC2626;">删除账号</div><div class="row__desc">删除所有数据，此操作不可撤销</div></div><div class="row__right"><button class="btn btn--danger">删除账号</button></div></div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('theme-digital'));
    document.getElementById('sidebarToggle').addEventListener('click', () => document.body.classList.toggle('sidebar-collapsed'));
  </script>
</body>
</html>
